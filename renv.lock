      "URL": "https://www.stat.auckland.ac.nz/~yee/VGAM/",
      "NeedsCompilation": "yes",
      "BuildVignettes": "yes",
      "LazyLoad": "yes",
      "LazyData": "yes",
      "Repository": "CRAN"
    },
