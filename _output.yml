# bookdown::gitbook output deliberately disabled --- the published site uses bs4_book.
# Re-enable only if you want a gitbook build alongside bs4. Don't put it first; the first
# format listed becomes the default when render_book() is called without output_format=,
# and that's what produced an accidental gitbook build on connect.posit.cloud previously.
#
# bookdown::gitbook:
#   includes:
#     in_header: [google_analytics.html, _ai_metadata.html]
#     after_body: _banner.html
#   resource_files:
#     - llms.txt
#     - llms-full.txt
#   css: style.css
#   split_by: section
#   config:
#     toc:
#       collapse: section
#       scroll_highlight: yes
#       sharing:
#         facebook: yes
#         github: yes
#         twitter: yes
#         linkedin: yes
#       info: yes
#       edit: https://github.com/mikenguyen13/data_analysis/edit/main/%s
#       before: |
#         <li><a href="./">A Guide on Data Analysis</a></li>
#       after: |
#         <li><a href="https://github.com/rstudio/bookdown" target="blank">Published with bookdown</a></li>
#     download: ["pdf", "epub","mobi"]
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: lualatex
  citation_package: natbib
  keep_tex: yes
bookdown::epub_book: 
  stylesheet: css/epub_style.css
bookdown::bs4_book:
  repo:
    base: https://github.com/mikenguyen13/data_analysis
    branch: main
  includes:
    in_header: [google_analytics.html, _ai_metadata.html]
    after_body: _banner.html
  resource_files:
    - llms.txt
    - llms-full.txt
    - sitemap.xml
    - robots.txt
